<!DOCTYPE html>
<html>
  <head>
    <title>Text Analyzer</title>
    <link rel="stylesheet" type="text/css" href="textanalyzer.css" />
    <script src="textanalyzer.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Text Analyzer</h1>

      <textarea
        id="inputText"
        placeholder="Write or paste your paragraph here..."
      ></textarea>

      <br />

      <button onclick="return analyzeText();">Analyze Text</button>

      <div id="resultBox" class="result-box">
        <h3>Result will appear here</h3>
      </div>
    </div>
  </body>
</html>
